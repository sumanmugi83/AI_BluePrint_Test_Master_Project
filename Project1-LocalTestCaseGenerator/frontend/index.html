<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B.L.A.S.T. Test Case Generator</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --chat-bg: #161b22;
            --text-color: #c9d1d9;
            --accent-color: #58a6ff;
            --border-color: #30363d;
            --user-msg-bg: #1f6feb;
            --ai-msg-bg: #21262d;
            --success-color: #238636;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            width: 100%;
            max-width: 900px;
            display: flex;
            flex-direction: column;
            height: 100%;
            border-left: 1px solid var(--border-color);
            border-right: 1px solid var(--border-color);
            background-color: var(--chat-bg);
        }

        header {
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
            text-align: center;
        }

        h1 {
            margin: 0;
            font-size: 1.2rem;
            color: var(--text-color);
        }

        .status-dot {
            height: 10px;
            width: 10px;
            background-color: var(--success-color);
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
        }

        #chat-window {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .message {
            max-width: 80%;
            padding: 15px;
            border-radius: 12px;
            line-height: 1.5;
            font-size: 0.95rem;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .user-message {
            align-self: flex-end;
            background-color: var(--user-msg-bg);
            color: white;
            border-bottom-right-radius: 2px;
        }

        .ai-message {
            align-self: flex-start;
            background-color: var(--ai-msg-bg);
            border: 1px solid var(--border-color);
            border-bottom-left-radius: 2px;
        }

        .ai-message pre {
            background: #0d1117;
            padding: 10px;
            border-radius: 6px;
            overflow-x: auto;
        }

        .input-area {
            padding: 20px;
            border-top: 1px solid var(--border-color);
            background-color: var(--chat-bg);
        }

        form {
            display: flex;
            gap: 10px;
            position: relative;
        }

        textarea {
            flex: 1;
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 15px;
            border-radius: 8px;
            resize: none;
            height: 60px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s;
        }

        textarea:focus {
            border-color: var(--accent-color);
        }

        button {
            background-color: var(--success-color);
            color: white;
            border: none;
            padding: 0 25px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: #2ea043;
        }

        button:disabled {
            background-color: var(--border-color);
            cursor: not-allowed;
            opacity: 0.7;
        }

        .loading-dots:after {
            content: '.';
            animation: dots 1.5s steps(5, end) infinite;
        }

        @keyframes dots {

            0%,
            20% {
                content: '.';
            }

            40% {
                content: '..';
            }

            60% {
                content: '...';
            }

            80%,
            100% {
                content: '';
            }
        }

        /* Test Case Styling */
        .tc-card {
            background: #0d1117;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            margin-bottom: 10px;
            padding: 10px;
        }

        .tc-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
            font-size: 0.85rem;
            color: #8b949e;
        }

        .tc-title {
            font-weight: bold;
            color: var(--accent-color);
            margin-bottom: 5px;
        }

        .tc-type {
            font-size: 0.75rem;
            padding: 2px 6px;
            border-radius: 4px;
            text-transform: uppercase;
        }

        .type-Positive {
            background: rgba(35, 134, 54, 0.2);
            color: #7ee787;
        }

        .type-Negative {
            background: rgba(218, 54, 51, 0.2);
            color: #ff7b72;
        }

        .type-EdgeCase {
            background: rgba(210, 153, 34, 0.2);
            color: #d29922;
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <h1><span class="status-dot"></span>Local Test Case Generator (Llama 3.2)</h1>
        </header>
        <div id="chat-window">
            <div class="message ai-message">
                Hello! I am your AI Test Engineer. Enter a User Story below, and I will generate comprehensive test
                cases for you.
            </div>
        </div>
        <div class="input-area">
            <form id="chat-form">
                <textarea id="user-input" placeholder="As a user, I want..." required></textarea>
                <button type="submit" id="send-btn">Generate</button>
            </form>
        </div>
    </div>

    <script>
        const chatWindow = document.getElementById('chat-window');
        const form = document.getElementById('chat-form');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const text = userInput.value.trim();
            if (!text) return;

            // Add User Message
            addMessage(text, 'user-message');
            userInput.value = '';

            // Show Loading
            const loadingId = addMessage('Analyzing requirements and generating test cases<span class="loading-dots"></span>', 'ai-message');
            sendBtn.disabled = true;

            // Timeout warning
            const timeoutWarning = setTimeout(() => {
                const msg = document.getElementById(loadingId);
                if (msg) msg.innerHTML += '<br><br><small><em>(Local LLM is crunching... this can take 30-60s depending on your hardware. Please wait.)</em></small>';
            }, 8000);

            try {
                const response = await fetch('http://localhost:8000/generate', {

                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_story: text })
                });

                const data = await response.json();

                // Remove Loading
                document.getElementById(loadingId).remove();

                if (data.error) {
                    addMessage(`Error: ${data.error}`, 'ai-message');
                } else {
                    renderTestCases(data);
                }

            } catch (err) {
                document.getElementById(loadingId).remove();
                addMessage(`Connection Error: Ensure backend is running. ${err.message}`, 'ai-message');
            } finally {
                sendBtn.disabled = false;
                userInput.focus();
            }
        });

        function addMessage(html, className) {
            const div = document.createElement('div');
            div.className = `message ${className}`;
            div.innerHTML = html;
            div.id = 'msg-' + Date.now();
            chatWindow.appendChild(div);
            chatWindow.scrollTop = chatWindow.scrollHeight;
            return div.id;
        }

        function renderTestCases(data) {
            let html = `<strong>Coverage Summary:</strong> ${data.summary || 'Generated Test Cases'}<br><br>`;

            if (data.test_cases && Array.isArray(data.test_cases)) {
                data.test_cases.forEach(tc => {
                    html += `
                        <div class="tc-card">
                            <div class="tc-header">
                                <span>${tc.id}</span>
                                <span class="tc-type type-${tc.type}">${tc.type}</span>
                            </div>
                            <div class="tc-title">${tc.title}</div>
                            <small>Steps:</small>
                            <ol style="margin: 5px 0 10px 20px; padding: 0;">
                                ${(tc.steps || []).map(s => `<li>${s}</li>`).join('')}
                            </ol>
                            <small>Expected: ${tc.expected_result}</small>
                        </div>
                    `;
                });
            } else {
                html += `<pre>${JSON.stringify(data, null, 2)}</pre>`;
            }

            addMessage(html, 'ai-message');
        }

        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                form.dispatchEvent(new Event('submit'));
            }
        });
    </script>
</body>

</html>
